  # AI Tool 10
  ai_tool_10:
    image: ai_tool_10_image
    container_name: ai_tool_10
    restart: always
    ports:
      - "5010:5010"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_10}
    depends_on:
      - postgres

  # AI Tool 11
  ai_tool_11:
    image: ai_tool_11_image
    container_name: ai_tool_11
