  # React Dashboard
  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    environment:
      REACT_APP_API_URL: http://localhost:4000
    volumes:
      - ./dashboard:/app

volumes:
  postgres_data:
  sqlite_data: