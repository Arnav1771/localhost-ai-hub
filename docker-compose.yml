version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # SQLite Database (for lightweight storage needs)
  sqlite:
    image: nouchka/sqlite3
    container_name: sqlite
    restart: always
    volumes:
      - sqlite_data:/data

  # AI Orchestration Gateway (Node.js)
  gateway:
    build:
      context: ./gateway
    container_name: gateway
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - sqlite
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SQLITE_PATH: /data/sqlite.db
    volumes:
      - ./gateway:/app
      - sqlite_data:/data

  # AI Tool 1
  ai_tool_1:
    image: ai_tool_1_image
    container_name: ai_tool_1
    restart: always
    ports:
      - "5001:5001"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_1}
    depends_on:
      - postgres

  # AI Tool 2
  ai_tool_2:
    image: ai_tool_2_image
    container_name: ai_tool_2
    restart: always
    ports:
      - "5002:5002"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_2}
    depends_on:
      - postgres

  # AI Tool 3
  ai_tool_3:
    image: ai_tool_3_image
    container_name: ai_tool_3
    restart: always
    ports:
      - "5003:5003"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_3}
    depends_on:
      - postgres

  # AI Tool 4
  ai_tool_4:
    image: ai_tool_4_image
    container_name: ai_tool_4
    restart: always
    ports:
      - "5004:5004"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_4}
    depends_on:
      - postgres

  # AI Tool 5
  ai_tool_5:
    image: ai_tool_5_image
    container_name: ai_tool_5
    restart: always
    ports:
      - "5005:5005"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_5}
    depends_on:
      - postgres

  # AI Tool 6
  ai_tool_6:
    image: ai_tool_6_image
    container_name: ai_tool_6
    restart: always
    ports:
      - "5006:5006"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_6}
    depends_on:
      - postgres

  # AI Tool 7
  ai_tool_7:
    image: ai_tool_7_image
    container_name: ai_tool_7
    restart: always
    ports:
      - "5007:5007"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_7}
    depends_on:
      - postgres

  # AI Tool 8
  ai_tool_8:
    image: ai_tool_8_image
    container_name: ai_tool_8
    restart: always
    ports:
      - "5008:5008"
    environment:
      TOOL_CONFIG: ${TOOL_CONFIG_8}
    depends_on:
      - postgres

  # AI Tool 9
  ai_tool_9:
    image: ai_tool_9_image
    container_name: ai_tool_9
    restart: always
