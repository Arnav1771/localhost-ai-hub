version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ai-hub-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gateway/uploads:/app/uploads
    networks:
      - ai-hub-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ai-hub-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://gateway:3001/api
    depends_on:
      - gateway
    networks:
      - ai-hub-network

networks:
  ai-hub-network:
    driver: bridge

volumes:
  gateway-uploads:
    driver: local
